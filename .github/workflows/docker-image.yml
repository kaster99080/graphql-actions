name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-dept: 0

    - name: Docker login
      env: 
        DOCKER_USER: ${{ secrets.DOCKER_USER }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: |
        echo "Inciando login docker"
        docker login -u $DOCKER_USER -p $DOCKER_PASSWORD
        echo "Finalizando login docker"

    - name: Build docker image
      run: |
        docker build -t kaster99080/graphql-actions:0.0.2 .

    - name: Build docker image
      run: |
        docker push kaster99080/graphql-actions:0.0.2
        
